<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>📖</title>


<style>

*{
    box-sizing:border-box;
    user-select:none;
}


body{

    margin:0;

    min-height:100vh;

    background:#faf8ef;

    font-family:tahoma, sans-serif;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    color:#776e65;

    touch-action:none;

}



.container{

    width:min(95vw,500px);

}



h1{

    text-align:center;

    font-size:45px;

    margin:10px;

}



.top {
    display: flex;
    justify-content: center; /* آیتم‌ها را در مرکز قرار می‌دهد */
    align-items: center;
    gap: 15px;               /* فاصله یکسان بین تمام آیتم‌ها */
    margin-bottom: 15px;
    flex-wrap: wrap;         /* اگر صفحه کوچک بود، به هم نریزد */
}

.stats-wrapper{

    display:flex;

    gap:10px;

    flex:2;

}



.score-box{

    flex:1;

    background:#bbada0;

    color:white;

    padding:12px 8px;

    border-radius:12px;

    font-size:14px;

    font-weight:bold;

    text-align:center;

    box-shadow:0 4px 8px rgba(0,0,0,0.12);

}



.stats-wrapper .score-box:first-child{

    background:#d4a017;

}



.stats-wrapper .score-box:nth-child(2){

    background:#4a90e2;

}



.start-btn{

    flex:1;

    background:#6a4c93;

    color:white;

    border:0;

    padding:12px 8px;

    border-radius:12px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:0 4px 8px rgba(0,0,0,0.12);

}

.score-box{

    background:#bbada0;

    color:white;

    padding:10px 15px;

    border-radius:8px;

    font-size:16px;

}



button{

    background:#8f7a66;

    color:white;

    border:0;

    padding:10px 15px;

    border-radius:8px;

}



#game-board{

    width:100%;

    aspect-ratio:1;

    background:#bbada0;

    padding:12px;

    border-radius:10px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:12px;

}



.cell{

    background:#cdc1b4;

    border-radius:6px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    font-size:clamp(35px,9vw,60px);

}



.number{

    font-size:14px;

    margin-top:3px;

    color:#776e65;

    font-weight:bold;

}



.tile{

    animation:appear .15s ease;

}



@keyframes appear{

from{

transform:scale(0);

}

to{

transform:scale(1);

}

}



.message{

    text-align:center;

    margin-top:15px;

    font-size:18px;

}


</style>

</head>


<body>

<a href="index.html" style="position: fixed; top: 10px; right: 10px; background: #312e81; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; z-index: 999;">🏠 خانه</a>
<div class="container">


<h1>📖</h1>


<div class="top">
    <div class="stats-wrapper">
        <div class="score-box">رکورد: <span id="best">32</span></div>
        <div class="score-box">امتیاز: <span id="score">0</span></div>
    </div>
    <button onclick="restartGame()" class="start-btn">شروع</button>
</div>


<div id="game-board"></div>



<div class="message" id="message"></div>



</div>
<script>


const icons = {

2:"📕",

4:"📗",

8:"📘",

16:"📖",

32:"📒",

64:"📓",

128:"📔",

256:"📜",

512:"📝",

1024:"🖋️",

2048:"✒️",

4096:"✏️",

8192:"✍️"

};



let grid=[];

let score=0;

let best=localStorage.getItem("bookBest") || 0;



document.getElementById("best").innerText=best;




function startGame(){


    grid=new Array(16).fill(0);


    score=0;


    document.getElementById("message").innerText="";


    addRandomTile();

    addRandomTile();


    draw();


}





function addRandomTile(){


    let empty=[];


    for(let i=0;i<16;i++){


        if(grid[i]===0){

            empty.push(i);

        }


    }



    if(empty.length){


        let place=empty[Math.floor(Math.random()*empty.length)];


        grid[place]=Math.random()<0.9 ? 2 : 4;


    }


}





function draw(){


    const board=document.getElementById("game-board");


    board.innerHTML="";



    grid.forEach(value=>{


        let cell=document.createElement("div");


        cell.className="cell";



        if(value){


            cell.classList.add("tile");


            cell.innerHTML=

            icons[value]

            +

            "<div class='number'>"

            +

            value

            +

            "</div>";



        }



        board.appendChild(cell);



    });



    document.getElementById("score").innerText=score;



    if(score>best){


        best=score;


        localStorage.setItem("bookBest",best);


        document.getElementById("best").innerText=best;


    }


}





function slide(row){


    row=row.filter(x=>x!==0);



    for(let i=0;i<row.length-1;i++){


        if(row[i]===row[i+1]){


            row[i]=row[i]*2;


            score+=row[i];


            row.splice(i+1,1);


        }


    }



    while(row.length<4){


        row.push(0);


    }



    return row;


}






function move(direction){


    let old=JSON.stringify(grid);



    if(direction==="left"){


        for(let r=0;r<4;r++){


            let row=grid.slice(r*4,r*4+4);


            row=slide(row);



            for(let c=0;c<4;c++){


                grid[r*4+c]=row[c];


            }


        }


    }






    if(direction==="right"){


        for(let r=0;r<4;r++){


            let row=grid.slice(r*4,r*4+4).reverse();


            row=slide(row).reverse();



            for(let c=0;c<4;c++){


                grid[r*4+c]=row[c];


            }


        }


    }






    if(direction==="up"){


        for(let c=0;c<4;c++){


            let row=[

            grid[c],

            grid[c+4],

            grid[c+8],

            grid[c+12]

            ];



            row=slide(row);



            for(let r=0;r<4;r++){


                grid[c+r*4]=row[r];


            }


        }


    }






    if(direction==="down"){


        for(let c=0;c<4;c++){


            let row=[

            grid[c],

            grid[c+4],

            grid[c+8],

            grid[c+12]

            ].reverse();



            row=slide(row).reverse();



            for(let r=0;r<4;r++){


                grid[c+r*4]=row[r];


            }


        }


    }






    if(old!==JSON.stringify(grid)){


        addRandomTile();


        draw();


    }


}
// کنترل کیبورد

document.addEventListener("keydown",function(e){


    if(e.key==="ArrowLeft"){

        move("left");

    }


    if(e.key==="ArrowRight"){

        move("right");

    }


    if(e.key==="ArrowUp"){

        move("up");

    }


    if(e.key==="ArrowDown"){

        move("down");

    }


});





// کنترل لمس موبایل

let touchStartX=0;

let touchStartY=0;



document.addEventListener("touchstart",function(e){


    touchStartX=e.touches[0].clientX;

    touchStartY=e.touches[0].clientY;


});




document.addEventListener("touchend",function(e){


    let x=e.changedTouches[0].clientX;

    let y=e.changedTouches[0].clientY;



    let dx=x-touchStartX;

    let dy=y-touchStartY;



    if(Math.abs(dx)>Math.abs(dy)){


        if(dx>40){

            move("right");

        }


        else if(dx<-40){

            move("left");

        }


    }

    else{


        if(dy>40){

            move("down");

        }


        else if(dy<-40){

            move("up");

        }


    }


});






// کنترل موس

let mouseX=0;

let mouseY=0;



document.addEventListener("mousedown",function(e){


    mouseX=e.clientX;

    mouseY=e.clientY;


});




document.addEventListener("mouseup",function(e){


    let dx=e.clientX-mouseX;

    let dy=e.clientY-mouseY;



    if(Math.abs(dx)>Math.abs(dy)){


        if(dx>40){

            move("right");

        }


        else if(dx<-40){

            move("left");

        }


    }

    else{


        if(dy>40){

            move("down");

        }


        else if(dy<-40){

            move("up");

        }


    }


});






function restartGame(){


    startGame();


}





startGame();



</script>

      هر دو کتاب یکسان که ترکیب شوند، یک کتاب جدید با عدد بالاتر می‌سازند. <br>
