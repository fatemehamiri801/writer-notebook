<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209260.png">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3209/3209260.png">

<meta name="theme-color" content="#312e81">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="دفترچه من">

<title>خانه دفترچه‌ها</title>


<style>

* {
    box-sizing: border-box;
}


body {

    font-family: 'Segoe UI', Tahoma, sans-serif;

    background:
    radial-gradient(circle at top, #eef2ff, #f8fafc 45%);

    margin: 0;

    padding: 20px;

    display: flex;

    flex-direction: column;

    align-items: center;

    min-height: 100vh;

}


h1 {

    color: #312e81;

    margin: 45px 0 35px;

    text-align: center;

    font-size: 1.8rem;

}


.container {

    display: flex;

    gap: 22px;

    width: 100%;

    max-width: 850px;

    justify-content: center;

    flex-wrap: wrap;

}


.box {

    background: rgba(255,255,255,0.85);

    backdrop-filter: blur(8px);

    padding: 30px 20px;

    border-radius: 24px;

    text-align: center;

    width: 100%;

    max-width: 240px;

    min-height: 220px;

    box-shadow:
    0 10px 25px rgba(49,46,129,0.08);

    transition: all 0.3s ease;

    border: 2px solid #e2e8f0;

    text-decoration: none;

    display: flex;

    flex-direction: column;

    justify-content: center;

    align-items: center;

    color: #1e1b4b;

}


.box:hover {

    border-color: #5b21b6;

    transform: translateY(-8px);

    box-shadow:
    0 15px 30px rgba(91,33,182,0.15);

}


.emoji {

    font-size: 62px;

    margin-bottom: 15px;

    display: block;

}


h2 {

    font-size: 1.15rem;

    margin: 0;

}


@media(max-width:600px) {


    body {

        padding: 15px;

    }


    h1 {

        font-size: 1.4rem;

        margin: 25px 0;

    }


    .container {

        flex-direction: column;

        align-items: center;

        gap: 18px;

    }


    .box {

        max-width: 100%;

        min-height: 190px;

    }

}


</style>


</head>


<body>


<h1>
کدام دفترچه را باز کنیم؟
</h1>



<div class="container">


<a href="nevisandegi.html" class="box">

<span class="emoji">🖋️</span>

<h2>
دفترچه نویسندگی
</h2>

</a>



<a href="reader.html" class="box">

<span class="emoji">📖</span>

<h2>
دفترچه کتاب‌خوان
</h2>

</a>



<a href="game.html" class="box" style="text-decoration: none; color: inherit; display: block; text-align: center; padding: 20px; border: 2px solid #ccc; border-radius: 15px; transition: 0.3s;">
    <span class="emoji">🎮</span>
    <h2>بازی کتاب‌ها</h2>
    <p>به کتاب ۲۰۴۸ برسید!</p>
</a>

</div>



<script>


if ('serviceWorker' in navigator) {

window.addEventListener('load', () => {


navigator.serviceWorker.register('sw.js')


.then(registration => {

console.log('Service Worker فعال شد');

registration.update();


})


.catch(error => {

console.log('Service Worker خطا:', error);

});


});

}


</script>


</body>

</html>
