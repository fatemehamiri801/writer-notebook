<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209260.png">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3209/3209260.png">

<!-- پالت رنگ جدید بر پایه نیلی و بنفش تیره -->
<meta name="theme-color" content="#4c1d95"> 
<meta name="apple-mobile-web-app-title" content="دفترچه من">

<title>خانه دفترچه‌ها</title>


<style>
* { box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    /* تغییر گرادینت پس‌زمینه به یک ترکیب عمیق‌تر از نیلی و سفید */
    background: radial-gradient(circle at center, #f5f3ff, #e0e7ff 40%, #c7d2fe 100%);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

h1 {
    /* تغییر رنگ تیتر به بنفش تیره و غنی */
    color: #4c1d95; 
    margin: 45px 0 35px;
    text-align: center;
    font-size: 1.8rem;
    text-shadow: 0 2px 10px rgba(76, 29, 149, 0.15);
}

.container {
    display: flex;
    gap: 22px;
    width: 100%;
    max-width: 850px;
    justify-content: center;
    flex-wrap: wrap;
}

.box {
    background: rgba(255, 255, 255, 0.92); /* پس‌زمینه روشن‌تر برای کنتراست بهتر */
    backdrop-filter: blur(10px);
    padding: 30px 20px;
    border-radius: 28px; /* گردی بیشتر لبه‌ها */
    text-align: center;
    width: 100%;
    max-width: 240px;
    min-height: 220px;
    /* سایه‌ی عمیق‌تر اما نرم برای ایجاد حس شناوری */
    box-shadow: 0 10px 30px rgba(76, 29, 149, 0.12);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    /* تغییر رنگ و ضخامت بوردر به بنفش ملایم */
    border: 2.5px solid #a78bfa; 
    text-decoration: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #2e1065; /* رنگ متن تیره برای خوانایی */
}

.box:hover {
    /* تغییر رنگ بوردر در حالت هاور به بنفش پررنگ */
    border-color: #7c3aed; 
    /* افزایش ارتفاع و شدت سایه در هاور */
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 20px 40px rgba(124, 58, 237, 0.25);
}

.emoji { font-size: 72px; margin-bottom: 15px; display: block; } /* کمی بزرگتر کردن ایموجی‌ها */
h2 { font-size: 1.2rem; margin: 0; font-weight: 700; } /* وزن فونت بیشتر برای تیتر */
.box p { font-size: 0.9rem; color: #5b21b6; margin-top: 12px; line-height: 1.5; font-weight: 500;}

@media(max-width:600px) {
    body { padding: 15px; }
    h1 { font-size: 1.4rem; margin: 25px 0; }
    .container { gap: 18px; }
    .box { max-width: 100%; min-height: 190px; }
}
</style>
</head>

<body>
    <h1>کدام دفترچه را باز کنیم؟</h1>

    <div class="container">
        <a href="nevisandegi.html" class="box">
            <span class="emoji">🖋️</span>
            <h2>دفترچه نویسندگی</h2>
            <p>ابزار ثبت و پرورش ایده‌های داستانی.</p>
        </a>

        <a href="reader.html" class="box">
            <span class="emoji">📖</span>
            <h2>دفترچه کتاب‌خوان</h2>
            <p>ثبت و تحلیل کتاب‌های مطالعه شده.</p>
        </a>

    <a href="game.html" class="box">
    <span class="emoji">📚</span>
    <h2>جورچین کتاب‌ها</h2>
    <p>به سطح استاد کتاب برس!</p>
</a>
    </div>
	<a href="about.html" class="purpose-btn">
    ✨ هدف و داستان این ابزار
</a>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => { console.log('Service Worker فعال شد'); })
                .catch(error => { console.log('Service Worker خطا:', error); });
            });
        }
    </script>
</body>
</html>
