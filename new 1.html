<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کتابخانه اسرارآمیز | بازی کتاب‌ها</title>


<style>


*{

box-sizing:border-box;

margin:0;

padding:0;

font-family:Tahoma, Arial, sans-serif;

}



body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:

linear-gradient(

135deg,

#f5f0e6,

#dcedc8

);

color:#3e2723;

overflow-x:hidden;

}




.game-container{

width:min(95vw,520px);

max-height:95vh;

overflow-y:auto;

background:

linear-gradient(

135deg,

#fff8dc,

#ffe082

);

border-radius:30px;

padding:clamp(15px,4vw,25px);

box-shadow:

0 15px 40px rgba(0,0,0,.18);

text-align:center;

}





.title{

font-size:clamp(22px,5vw,32px);

color:#5d4037;

margin-bottom:8px;

}




.subtitle{

font-size:14px;

color:#795548;

margin-bottom:18px;

}




.info-panel{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

margin-bottom:12px;

}




.info-box{

background:

linear-gradient(

135deg,

#fff3cd,

#ffcc80

);

border-radius:18px;

padding:10px 5px;

font-size:13px;

box-shadow:

0 5px 10px rgba(0,0,0,.08);

}




.info-box span{

display:block;

font-size:21px;

font-weight:bold;

margin-top:5px;

}




.library-panel{

background:

rgba(255,255,255,.45);

border-radius:20px;

padding:12px;

margin-bottom:15px;

font-size:14px;

}



.library-panel strong{

color:#6d4c41;

}




.start-btn{

border:none;

background:

linear-gradient(

135deg,

#8d6e63,

#4e342e

);

color:white;

padding:13px 35px;

border-radius:30px;

font-size:16px;

cursor:pointer;

margin-bottom:15px;

transition:.3s;

}




.start-btn:hover{

transform:scale(1.05);

}





#message{

min-height:25px;

margin-bottom:10px;

font-weight:bold;

color:#6d4c41;

}




#board{

width:min(90vw,460px);

aspect-ratio:1;

margin:auto;

display:grid;

grid-template-columns:repeat(8,1fr);

gap:8px;

padding:12px;


background:

linear-gradient(

135deg,

#bcaaa4,

#8d6e63

);


border-radius:25px;


box-shadow:

inset 0 0 20px rgba(0,0,0,.2);


touch-action:none;

}




.cell{

aspect-ratio:1;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

font-size:clamp(18px,4vw,32px);

background:

linear-gradient(

135deg,

#fffdf5,

#f5e6c8

);

border-radius:12px;

cursor:pointer;

user-select:none;


transition:

transform .25s ease,

opacity .25s ease,

box-shadow .25s ease;

}



/* حرکت نرم کتاب‌ها */

.cell.moving{

transition:transform .3s ease;

z-index:5;

}



.cell:hover{

transform:scale(1.05);

box-shadow:

0 5px 12px rgba(0,0,0,.15);

}




.cell.selected{

transform:scale(1.12);

background:#fff3cd;

box-shadow:

0 0 15px rgba(255,193,7,.8);

}

.cell.removing{

animation:

bookRemove .35s forwards;

}



@keyframes bookRemove{


0%{

transform:scale(1);

opacity:1;

}


50%{

transform:scale(1.35) rotate(15deg);

opacity:.5;

}


100%{

transform:scale(0);

opacity:0;

}


}





.cell.falling{

animation:

bookFall .35s ease;

}





@keyframes bookFall{


from{

transform:translateY(-50px);

opacity:0;

}


to{

transform:translateY(0);

opacity:1;

}


}




.cell.invalid{

animation:

shake .35s;

}





@keyframes shake{


0%,100%{

transform:translateX(0);

}


25%{

transform:translateX(-8px);

}


50%{

transform:translateX(8px);

}


75%{

transform:translateX(-5px);

}


}

.game-shake{

animation:screenShake .4s;

}


@keyframes screenShake{

0%{
transform:translateX(0);
}

25%{
transform:translateX(-8px);
}

50%{
transform:translateX(8px);
}

75%{
transform:translateX(-5px);
}

100%{
transform:translateX(0);
}

}


@keyframes specialAppear{


0%{

transform:scale(0) rotate(180deg);

opacity:0;

}


60%{

transform:scale(1.3) rotate(20deg);

opacity:1;

}


100%{

transform:scale(1) rotate(0);

opacity:1;

}


}



.cell.new-special{

animation:

specialAppear .6s ease;

}

/* کتاب ویژه */


.cell.special{

background:
linear-gradient(
135deg,
#ffd54f,
#ffb300
);

font-size:clamp(14px,3vw,24px);

box-shadow:
0 0 18px rgba(255,193,7,.8);

}

/* کتاب طلایی */

.cell.gold-book{

background:
linear-gradient(
135deg,
#fff176,
#ffb300
);

box-shadow:
0 0 20px rgba(255,193,7,.9);

animation:goldGlow 1s infinite alternate;

}



/* کتاب جادویی */

.cell.magic-book{

background:
linear-gradient(
135deg,
#ce93d8,
#7b1fa2
);

box-shadow:
0 0 22px rgba(156,39,176,.9);

animation:magicGlow 1.2s infinite alternate;

}



/* کتاب زمان */

.cell.time-book{

background:
linear-gradient(
135deg,
#80deea,
#0288d1
);

box-shadow:
0 0 22px rgba(3,169,244,.9);

animation:timeGlow 1s infinite alternate;

}




@keyframes goldGlow{

from{

transform:scale(1);

}

to{

transform:scale(1.08);

}

}



@keyframes magicGlow{

from{

filter:hue-rotate(0deg);

}

to{

filter:hue-rotate(40deg);

}

}



@keyframes timeGlow{

from{

transform:rotate(-3deg);

}

to{

transform:rotate(3deg);

}

}


/* پنل کتابخانه */


.collection{

display:flex;

justify-content:center;

gap:5px;

flex-wrap:wrap;

margin-top:8px;

}




.book-item{

font-size:25px;

opacity:.35;

filter:grayscale(1);

transition:.3s;

}



.book-item.unlocked{

opacity:1;

filter:none;

transform:scale(1.1);

}






/* دکمه کتابخانه */


.library-btn{

margin-top:10px;

border:none;

background:#795548;

color:white;

padding:10px 20px;

border-radius:20px;

cursor:pointer;

font-size:14px;

}




.cell.hint{

animation:hintGlow .8s infinite alternate;

}


@keyframes hintGlow{

from{

box-shadow:0 0 5px #ffd54f;

transform:scale(1);

}


to{

box-shadow:0 0 25px #ffb300;

transform:scale(1.12);

}

}


</style>
</head>


<body>


<div class="game-container">



<h1 class="title">

📚 کتابخانه اسرارآمیز

</h1>



<p class="subtitle">

سه کتاب مشابه را کنار هم قرار بده و کتاب‌های جدید کشف کن ✨

</p>





<div class="info-panel">



<div class="info-box">

⭐ امتیاز

<span id="score">

0

</span>

</div>




<div class="info-box">

🏆 رکورد

<span id="high-score">

0

</span>

</div>




<div class="info-box">

⏳ زمان

<span id="timer">

180

</span>

</div>



</div>







<div class="library-panel">


📖 سطح خواننده:

<strong id="reader-level">

🌱 تازه‌کار

</strong>


<br>


کتاب کشف شده:

<strong id="current-book">

📕 کتاب تازه‌کار

</strong>



<div class="collection" id="collection">


<div class="book-item unlocked">

📕

</div>


<div class="book-item">

📗

</div>


<div class="book-item">

📘

</div>


<div class="book-item">

📙

</div>


<div class="book-item">

📚

</div>


</div>


</div>







<button class="start-btn" onclick="startGame()">


شروع بازی 📖


</button>





<div id="message">


</div>





<div id="board">


</div>




<button class="library-btn" onclick="openLibrary()">


📚 کتابخانه من


</button>

<button class="library-btn" onclick="showHint()">


💡 پیدا کردن حرکت


</button>

<script>


// =========================
// اطلاعات کتاب‌ها
// =========================


const books = [


"📕",

"📗",

"📘",

"📙",

"📖",

"📓",

"📔",

"📒",

"📚"


];




// کتاب‌های قابل کشف


const unlockBooks = [


{

score:0,

icon:"📕",

name:"کتاب تازه‌کار",

level:"🌱 تازه‌کار"

},


{

score:300,

icon:"📗",

name:"داستان‌خوان",

level:"🌿 کتابخوان"

},


{

score:800,

icon:"📘",

name:"رمان‌دوست",

level:"📚 عاشق داستان"

},


{

score:1500,

icon:"📙",

name:"کاوشگر کتاب",

level:"🔍 جستجوگر"

},


{

score:3000,

icon:"📚",

name:"نگهبان کتابخانه",

level:"🏛️ استاد کتاب"

}


];





const boardSize = 8;



let board=[];


let score=0;


let highScore=0;


let combo=0;


let timer;


let timeLeft=180;


let gameStarted=false;


let selectedCell=null;


let oldBoard=null;
let hintCount=6;

// کتاب‌های ویژه

const specialBooks = {

gold:"👑📖",

magic:"✨📚",

time:"⏳📖"

};


// عناصر صفحه

const boardElement = document.getElementById("board");

const scoreElement = document.getElementById("score");

const highScoreElement = document.getElementById("high-score");

const timerElement = document.getElementById("timer");

const messageElement = document.getElementById("message");

const levelElement = document.getElementById("reader-level");

const currentBookElement = document.getElementById("current-book");




// شروع بازی


function startGame(){



clearInterval(timer);



score=0;
hintCount=6;

combo=0;


timeLeft=180;


selectedCell=null;


gameStarted=true;



scoreElement.innerText=score;


timerElement.innerText=timeLeft;


messageElement.innerText="";



loadHighScore();


createBoard();


updateLibrary();


startTimer();



}

// =========================
// بررسی وجود حرکت ممکن
// =========================


function hasPossibleMove(){


for(let row=0;row<boardSize;row++){


for(let col=0;col<boardSize;col++){



// بررسی راست

if(col<boardSize-1){


swapTest(row,col,row,col+1);



if(findMatches().length>0){


swapTest(row,col,row,col+1);


return true;


}



swapTest(row,col,row,col+1);



}





// بررسی پایین

if(row<boardSize-1){


swapTest(row,col,row+1,col);



if(findMatches().length>0){


swapTest(row,col,row+1,col);


return true;


}



swapTest(row,col,row+1,col);



}



}



}



return false;


}






// =========================
// ساخت جدول
// =========================


function createBoard(){


let attempts=0;



do{


board=[];


boardElement.innerHTML="";



for(let row=0;row<boardSize;row++){


board[row]=[];



for(let col=0;col<boardSize;col++){



let book=randomBook();



board[row][col]=book;



createCell(row,col,book);



}



}



attempts++;



if(attempts>50){

break;

}



}

while(!hasPossibleMove());



}


// کتاب تصادفی


function randomBook(){



return books[

Math.floor(Math.random()*books.length)

];


}
//ساختن خانه بازی

function createCell(row,col,book){

const cell=document.createElement("div");

cell.className="cell";

if(
book===specialBooks.gold ||
book===specialBooks.magic ||
book===specialBooks.time
){

cell.classList.add("special");


if(book===specialBooks.gold){

cell.classList.add("gold-book");

}


if(book===specialBooks.magic){

cell.classList.add("magic-book");

}


if(book===specialBooks.time){

cell.classList.add("time-book");

}

}

cell.dataset.row=row;
cell.dataset.col=col;

cell.innerText=book;

cell.addEventListener("click",()=>{

selectCell(cell);

});

boardElement.appendChild(cell);

}









// انتخاب خانه


function selectCell(cell){



if(!gameStarted) return;



if(selectedCell===null){



selectedCell=cell;


cell.classList.add("selected");



}

else{



let first=selectedCell;



first.classList.remove("selected");



if(first===cell){


selectedCell=null;


return;


}



if(isAdjacent(first,cell)){



saveOldBoard();



swapCells(first,cell);



}

else{


showMessage("📚 فقط کتاب‌های کنار هم را انتخاب کن");


shakeCell(cell);


}



selectedCell=null;



}



}







// ذخیره وضعیت قبل از حرکت


function saveOldBoard(){



oldBoard=JSON.parse(JSON.stringify(board));



}







// بررسی کنار هم بودن


function isAdjacent(cell1,cell2){



let r1=Number(cell1.dataset.row);


let c1=Number(cell1.dataset.col);



let r2=Number(cell2.dataset.row);


let c2=Number(cell2.dataset.col);



return Math.abs(r1-r2)+Math.abs(c1-c2)===1;



}







// جابه‌جایی

function swapCells(cell1,cell2){
if(!gameStarted) return;
messageElement.innerText="";
let r1=Number(cell1.dataset.row);
let c1=Number(cell1.dataset.col);

let r2=Number(cell2.dataset.row);
let c2=Number(cell2.dataset.col);



cell1.classList.add("moving");
cell2.classList.add("moving");



let rect1=cell1.getBoundingClientRect();
let rect2=cell2.getBoundingClientRect();



let x=rect2.left-rect1.left;
let y=rect2.top-rect1.top;



cell1.style.transform=`translate(${x}px,${y}px)`;

cell2.style.transform=`translate(${-x}px,${-y}px)`;



setTimeout(()=>{


let temp=board[r1][c1];


board[r1][c1]=board[r2][c2];


board[r2][c2]=temp;



renderBoard();


checkMatchesAfterMove();



},300);


}







// بازسازی صفحه


function renderBoard(){



boardElement.innerHTML="";



for(let row=0;row<boardSize;row++){



for(let col=0;col<boardSize;col++){



createCell(

row,

col,

board[row][col]

);



}



}



}







// بررسی نتیجه حرکت


function checkMatchesAfterMove(){



let matches=findMatches();



if(matches.length>0){



removeBooks(matches);



}

else{



board=oldBoard;



renderBoard();



showMessage("📖 این حرکت کتاب جدیدی پیدا نکرد");



}



}







// افکت حرکت اشتباه


function shakeCell(cell){



cell.classList.add("invalid");



setTimeout(()=>{


cell.classList.remove("invalid");


},400);



}







// پیام


function showMessage(text){



messageElement.innerText=text;



}

// =========================
// سیستم پیدا کردن سه‌تایی‌ها
// =========================



function findMatches(){



let matches=[];



// ردیف‌ها


for(let row=0;row<boardSize;row++){



let count=1;



for(let col=1;col<boardSize;col++){



if(board[row][col]===board[row][col-1]){



count++;


}

else{



if(count>=3){



for(let k=col-count;k<col;k++){



matches.push({

row:row,

col:k

});


}



}



count=1;



}



}



if(count>=3){



for(let k=boardSize-count;k<boardSize;k++){



matches.push({

row:row,

col:k

});


}



}



}






// ستون‌ها


for(let col=0;col<boardSize;col++){



let count=1;



for(let row=1;row<boardSize;row++){



if(board[row][col]===board[row-1][col]){



count++;


}

else{



if(count>=3){



for(let k=row-count;k<row;k++){



matches.push({

row:k,

col:col

});


}



}



count=1;



}



}



if(count>=3){



for(let k=boardSize-count;k<boardSize;k++){



matches.push({

row:k,

col:col

});


}



}



}



return removeDuplicateMatches(matches);



}







// حذف تکراری‌ها


function removeDuplicateMatches(matches){



return matches.filter((item,index)=>{



return matches.findIndex(other=>



other.row===item.row &&

other.col===item.col



)===index;



});



}







// حذف کتاب‌ها


function removeBooks(matches){


combo++;


let cells=document.querySelectorAll(".cell");



matches.forEach(item=>{


let index=item.row*boardSize+item.col;


if(cells[index]){


cells[index].classList.add("removing");


}


});





setTimeout(()=>{



matches.forEach(item=>{


board[item.row][item.col]=null;


});





let points=matches.length*10*combo;



score+=points;


scoreElement.innerText=score;




if(combo>1){


showMessage(

"🔥 کمبو x"+combo+" | +"+points

);


}





createSpecial(matches);



updateLibrary();



updateHighScore();




renderBoard();





setTimeout(()=>{


dropBooks();


},300);




},350);



}






// ساخت کتاب ویژه


function createSpecial(matches){


let item=matches[0];


let created=null;



if(matches.length>=6){

created=specialBooks.time;

}


else if(matches.length===5){

created=specialBooks.magic;

}


else if(matches.length===4){

created=specialBooks.gold;

}



if(created){


board[item.row][item.col]=created;


setTimeout(()=>{


let index=item.row*boardSize+item.col;


let cells=document.querySelectorAll(".cell");


if(cells[index]){

cells[index].classList.add("new-special");

}



},50);



showMessage(

"✨ کتاب ویژه کشف شد: "+created

);


}


}
// =========================
// سقوط کتاب‌ها
// =========================



function dropBooks(){


for(let col=0;col<boardSize;col++){


let empty=0;



for(let row=boardSize-1;row>=0;row--){



if(board[row][col]===null){


empty++;


}

else if(empty>0){



board[row+empty][col]=board[row][col];


board[row][col]=null;



}


}





for(let row=0;row<empty;row++){



board[row][col]=randomBook();



}



}




renderBoard();




setTimeout(()=>{


let again=findMatches();



if(again.length>0){


removeBooks(again);


}

else{


combo=0;



// اگر هیچ حرکت ممکنی باقی نمانده بود
if(!hasPossibleMove()){



showMessage("🔄 کتابخانه دوباره مرتب شد");



setTimeout(()=>{


createBoard();


},800);



}



}



},600);



}




// =========================
// کلیک روی کتاب ویژه
// =========================



boardElement.addEventListener("click",(e)=>{



if(!e.target.classList.contains("cell")) return;



let value=e.target.innerText;



if(
value===specialBooks.gold ||
value===specialBooks.magic ||
value===specialBooks.time
){

activateSpecial(e.target);

}



});






function activateSpecial(cell){


let row=Number(cell.dataset.row);

let col=Number(cell.dataset.col);

let value=cell.innerText;



// کتاب طلایی 👑📖

if(value===specialBooks.gold){


let removed=[];


for(let c=0;c<boardSize;c++){


removed.push({

row:row,

col:c

});


}



removed.forEach(item=>{


board[item.row][item.col]=null;


});



score+=150;


scoreElement.innerText=score;


showMessage("👑📖 کتاب طلایی یک ردیف را پاک کرد!");



updateHighScore();


renderBoard();


setTimeout(()=>{


dropBooks();


},300);



}
// کتاب جادویی ✨📚

else if(value===specialBooks.magic){


let targetBook=null;


// پیدا کردن یک کتاب معمولی روی صفحه

for(let r=0;r<boardSize;r++){

for(let c=0;c<boardSize;c++){


if(
board[r][c]!==null &&
board[r][c]!==specialBooks.gold &&
board[r][c]!==specialBooks.magic &&
board[r][c]!==specialBooks.time
){

targetBook=board[r][c];

break;

}


}

if(targetBook) break;

}



// حذف تمام همان نوع کتاب

for(let r=0;r<boardSize;r++){

for(let c=0;c<boardSize;c++){


if(board[r][c]===targetBook){

board[r][c]=null;

}


}

}


score+=200;

scoreElement.innerText=score;


showMessage("✨📚 کتاب جادویی همه کتاب‌های مشابه را پاک کرد!");

updateHighScore();


renderBoard();


setTimeout(()=>{

dropBooks();

},300);


}



// کتاب زمان ⏳📖

else if(value===specialBooks.time){

timeLeft+=20;

timerElement.innerText=timeLeft;

score+=100;

scoreElement.innerText=score;

showMessage("⏳📖 بیست ثانیه به زمان اضافه شد!");

board[row][col]=null;

renderBoard();

setTimeout(()=>{

dropBooks();

},300);

}

}


// =========================
// سیستم راهنمای حرکت حرفه‌ای
// =========================


function showHint(){


if(hintCount<=0){


showMessage("📚 بودجه راهنمای شما ته کشید!");


return;


}


hintCount--;



document.querySelectorAll(".cell").forEach(cell=>{


cell.classList.remove("hint");


});


let originalBoard = JSON.parse(JSON.stringify(board));



let directions=[

[0,1],
[0,-1],
[1,0],
[-1,0]

];



for(let row=0;row<boardSize;row++){


for(let col=0;col<boardSize;col++){



for(let dir of directions){



let newRow=row+dir[0];

let newCol=col+dir[1];



if(

newRow>=0 &&
newRow<boardSize &&
newCol>=0 &&
newCol<boardSize

){



swapTest(
row,
col,
newRow,
newCol
);



let possible=findMatches().length>0;



board = JSON.parse(JSON.stringify(originalBoard));



if(possible){


highlightHint(
row,
col,
newRow,
newCol
);


return;


}



}



}



}



}



showMessage("🔍 هیچ حرکت ترکیبی پیدا نشد");


}




function swapTest(r1,c1,r2,c2){


let temp=board[r1][c1];


board[r1][c1]=board[r2][c2];


board[r2][c2]=temp;


}





function highlightHint(r1,c1,r2,c2){


let cells=document.querySelectorAll(".cell");



cells[r1*boardSize+c1].classList.add("hint");


cells[r2*boardSize+c2].classList.add("hint");



showMessage("💡 این دو کتاب را جابه‌جا کن");


}
// =========================
// تایمر
// =========================



function startTimer(){



timer=setInterval(()=>{



timeLeft--;



timerElement.innerText=timeLeft;




if(timeLeft<=0){



clearInterval(timer);



gameStarted=false;



showMessage(

"⏰ زمان تمام شد | امتیاز: "+score

);



saveHighScore();



}



},1000);



}





// =========================
// سیستم کتابخانه و پیشرفت
// =========================



function updateLibrary(){



let unlocked=unlockBooks[0];



for(let book of unlockBooks){



if(score>=book.score){



unlocked=book;



}



}




levelElement.innerText=unlocked.level;


currentBookElement.innerText=

unlocked.icon+" "+unlocked.name;
if(score>=3000){

levelElement.innerText=
"🏛️ استاد کتاب";

currentBookElement.innerText=
"📚 نگهبان کتابخانه | ✨ رتبه نهایی";

}




let items=document.querySelectorAll(".book-item");



unlockBooks.forEach((book,index)=>{



if(score>=book.score && items[index]){



items[index].classList.add("unlocked");



}



});





saveProgress();



}








// ذخیره پیشرفت


function saveProgress(){



localStorage.setItem(

"bookLibraryScore",

score

);



}








// باز کردن کتابخانه


function openLibrary(){



let unlockedCount=0;



unlockBooks.forEach(book=>{



if(score>=book.score){



unlockedCount++;



}



});



showMessage(

"📚 شما "+unlockedCount+" کتاب از ۵ کتابخانه را کشف کرده‌اید"

);



}








// =========================
// رکورد
// =========================



function loadHighScore(){



highScore=

Number(

localStorage.getItem("bookMatchHigh")

)||0;



highScoreElement.innerText=highScore;



}







function updateHighScore(){



if(score>highScore){



highScore=score;


highScoreElement.innerText=highScore;



}



}







function saveHighScore(){



localStorage.setItem(

"bookMatchHigh",

highScore

);



}







// =========================
// کنترل موس
// =========================



let dragStart=null;





boardElement.addEventListener(

"mousedown",

(e)=>{



if(e.target.classList.contains("cell")){



dragStart=e.target;



}



});








boardElement.addEventListener(

"mouseup",

(e)=>{



if(!dragStart)return;



if(e.target.classList.contains("cell")){



if(isAdjacent(dragStart,e.target)){



saveOldBoard();



swapCells(

dragStart,

e.target

);



}



}



dragStart=null;



});






// =========================
// کنترل لمس موبایل
// =========================



let touchStart=null;





boardElement.addEventListener(

"touchstart",

(e)=>{



if(e.target.classList.contains("cell")){



touchStart=e.target;



}



});








boardElement.addEventListener(

"touchend",

(e)=>{



let touchEnd=e.target;



if(

touchStart &&

touchEnd.classList.contains("cell")

){



if(isAdjacent(touchStart,touchEnd)){



saveOldBoard();



swapCells(

touchStart,

touchEnd

);



}



}



touchStart=null;



});








// =========================
// بارگذاری اولیه
// =========================



window.onload=()=>{



loadHighScore();



createBoard();



updateLibrary();



startTimer();



gameStarted=true;



};








// جلوگیری از انتخاب متن هنگام لمس


document.addEventListener(

"selectstart",

(e)=>{



if(e.target.closest("#board")){



e.preventDefault();



}



});








// =========================
// پایان توابع جاوااسکریپت
// =========================
</script>
